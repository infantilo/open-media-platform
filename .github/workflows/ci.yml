name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nodes

      # `make ci` ruft u.a. `cargo deny check`/`cargo audit` als CLI-Tools
      # auf (einzige Quelle der Wahrheit, gleiche Kommandos lokal wie in
      # CI) — hier als vorgebaute Binaries installiert statt per
      # `cargo install` (Compile-Zeit aus Quelle wäre mehrere Minuten pro
      # CI-Lauf, docs/decisions.md Schritt C1).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit

      - name: make ci
        run: make ci

  # Platzhalter für Schritt D2 (UMSETZUNG.md): AMWA NMOS Testing Tool gegen
  # Registry + Nodes in CI. Noch deaktiviert — braucht laufende
  # Registry-/Node-Container, die erst mit dem Compose-/Quadlet-Setup aus
  # D2 automatisiert bereitgestellt werden.
  amwa-nmos-testing:
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "AMWA NMOS Testing Tool folgt in Schritt D2 (UMSETZUNG.md)"
